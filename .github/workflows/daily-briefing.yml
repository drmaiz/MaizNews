name: Generate Daily Briefing

on:
  schedule:
    - cron: '0 7 * * *'  # 7 AM UTC daily
  workflow_dispatch:  # Manual trigger via GitHub UI

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Google credentials
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ -z "$GOOGLE_CREDENTIALS" ]; then
            echo "Warning: GOOGLE_CREDENTIALS secret not set. Set it via GitHub repo settings."
            exit 0
          fi
          echo "$GOOGLE_CREDENTIALS" > credentials.json

      - name: Generate daily briefing
        run: |
          python daily_briefing_generator.py

      - name: Commit and push
        run: |
          git config user.name "Daily Briefing Bot"
          git config user.email "action@github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add daily-briefing-*.html
            git commit -m "Generate daily briefing - $(date +%Y-%m-%d)"
            git push
          fi
        continue-on-error: true
